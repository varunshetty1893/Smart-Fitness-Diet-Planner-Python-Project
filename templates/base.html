<!DOCTYPE html>
<html>

<head>
    <title>Diet Planner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar fixed-top">
        <div class="container">

            <!-- Logo + Title -->
            <a class="navbar-brand fw-bold d-flex align-items-center" href="{{ url_for('home') }}">
                <i class="bi bi-heart-pulse-fill me-2"></i>
                Smart Diet <span class="brand-light">&nbsp;& Fitness Planner</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto nav-custom">

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('home') }}#hero">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('home') }}#features">Features</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('home') }}#about">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('home') }}#contact">Contact</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link highlight-nav" href="{{ url_for('login') }}">Login</a>
                    </li>


                </ul>
            </div>
        </div>
    </nav>


    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    {% if request.endpoint in ['login', 'register'] %}
    <footer class="footer-premium text-center">
        <div class="container">
            <div class="py-3">
                © 2026 Diet Planner. All Rights Reserved.
            </div>
        </div>
    </footer>
    {% else %}
    {% include "footer.html" %}
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
