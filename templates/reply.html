<!DOCTYPE html>
<html>

<head>
    <title>Reply to Feedback</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>

<body>

{% include "admin_sidebar.html" %}
{% include "admin_topbar.html" %}

<div class="admin-content">
<div class="container-fluid">
<div class="row justify-content-center">
<div class="col-xl-10">

<h4 class="mb-4">
    <i class="bi bi-reply-fill text-success"></i>
    Reply to User
</h4>

<div class="card shadow-sm">

<div class="card-body">

    <!-- USER DETAILS -->
    <div class="mb-3">
        <label class="fw-bold">Name</label>
        <input type="text" class="form-control"
               value="{{ feedback[0] }}" disabled>
    </div>

    <div class="mb-3">
        <label class="fw-bold">Email</label>
        <input type="text" class="form-control"
               value="{{ feedback[1] }}" disabled>
    </div>

    <div class="mb-3">
        <label class="fw-bold">Subject</label>
        <input type="text" class="form-control"
               value="{{ feedback[2] }}" disabled>
    </div>

    <!-- ORIGINAL MESSAGE -->
    <div class="mb-4">
        <label class="fw-bold">Original Message</label>
        <div class="border rounded p-3 bg-light">
            {{ feedback[3] }}
        </div>
    </div>

    <hr>

    <!-- REPLY FORM -->
    <form method="POST">

        <div class="mb-3">
            <label class="fw-bold">Your Reply</label>
            <textarea name="reply"
                      class="form-control"
                      rows="6"
                      placeholder="Write your reply here..."
                      required></textarea>
        </div>

        <div class="d-flex justify-content-between">

            <a href="{{ url_for('admin_feedback') }}"
               class="btn btn-secondary">
               <i class="bi bi-arrow-left"></i> Back
            </a>

            <button type="submit"
                    class="btn btn-success">
                <i class="bi bi-send-fill"></i>
                Send Reply
            </button>

        </div>

    </form>

</div>
</div>

<footer class="admin-footer mt-4">
© 2026 Smart Diet Planner — Admin Panel
</footer>

</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
