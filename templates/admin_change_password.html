{% extends "admin_layout.html" %}
{% block content %}

<div class="admin-content">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-xl-10">

                <!-- HEADER -->
                <div class="mb-4">
                    <h4 class="mb-1">Change Password</h4>
                    <p class="text-muted mb-0">Update your admin password securely</p>
                </div>

                <!-- CARD -->
                <div class="user-card" style="max-width:500px; margin:auto;">

                    <form method="POST" onsubmit="return validatePassword()">

                        <div class="mb-3">
                            <label class="form-label">Current Password</label>
                            <input type="password"
                                   name="current_password"
                                   id="current_password"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password"
                                   name="new_password"
                                   id="new_password"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password"
                                   name="confirm_password"
                                   id="confirm_password"
                                   class="form-control"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-success w-100 rounded-pill">
                            Update Password
                        </button>

                    </form>

                </div>

                <!-- FOOTER -->
                <footer class="admin-footer text-center mt-5">
                    © 2026 Smart Diet Planner — Admin Panel
                </footer>

            </div>
        </div>
    </div>
</div>

<!-- SIMPLE JS VALIDATION -->
<script>
function validatePassword(){

    let newPass = document.getElementById("new_password").value;
    let confirmPass = document.getElementById("confirm_password").value;

    if(newPass.length < 6){
        alert("New password must be at least 6 characters.");
        return false;
    }

    if(newPass !== confirmPass){
        alert("New password and confirm password do not match.");
        return false;
    }

    return true;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% endblock %}
